name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Set up Rust 1.88.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Remove checked-in lockfile for CI resolution
        run: python -c "from pathlib import Path; Path('uv.lock').unlink(missing_ok=True)"

      - name: Sync dev environment
        run: uv sync --dev --python 3.12
        env:
          UV_DEFAULT_INDEX: https://pypi.org/simple

      - name: Build extension module
        run: uv run maturin develop --uv
        env:
          UV_DEFAULT_INDEX: https://pypi.org/simple

      - name: Run test suite
        run: uv run pytest -q
        env:
          UV_DEFAULT_INDEX: https://pypi.org/simple

  stub-check:
    name: Stub Sync
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Rust 1.88.0
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88.0

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Regenerate typing stubs
        run: python create_typing.py

      - name: Verify checked-in stub is current
        run: git diff --exit-code -- python/a2lfile/_a2lfile.pyi

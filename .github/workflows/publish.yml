name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  linux:
    name: Linux Wheel
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set release version from tag
        run: python scripts/set_release_version.py "${{ github.ref_name }}"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: auto
          args: --release --out dist -i python3.12

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-linux-x86_64
          path: dist

  windows:
    name: Windows Wheel
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set release version from tag
        run: python scripts/set_release_version.py "${{ github.ref_name }}"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          args: --release --out dist -i python

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-windows-x64
          path: dist


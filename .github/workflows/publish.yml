  sdist:
    name: Source Distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set release version from tag
        run: python scripts/set_release_version.py "${{ github.ref_name }}"

      - name: Build source distribution
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-sdist
          path: dist

  publish:
    name: Publish To TestPyPI
    runs-on: ubuntu-latest
    needs:
      - linux
      - windows
      - sdist
    permissions:
      contents: read
      id-token: write
    environment:
      name: testpypi
      url: https://test.pypi.org/project/nira-py-a2lfile/

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v3

      - name: Publish distributions
        run: uv publish --trusted-publishing always --publish-url https://test.pypi.org/legacy/ --check-url https://test.pypi.org/simple/ dist-*/*
